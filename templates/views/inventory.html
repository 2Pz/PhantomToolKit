<div class="h-full flex">
  <main class="flex-1 flex flex-col items-center justify-start p-4 overflow-y-auto custom-scrollbar">
    <div class="mb-4 w-full flex flex-col items-center">
      <h2 class="text-xl fantasy-font text-[#bfa571] uppercase tracking-widest text-center" data-i18n="inv_title">Inventory</h2>
      <div class="status-header-line w-64 mx-auto"></div>
      
      <div class="flex items-center gap-2 mt-4 p-2 bg-white/5 border border-white/5 rounded-md backdrop-blur-md w-full max-w-3xl justify-center">
        <button class="build-action-btn" onclick="refreshInventory()" data-i18n="inv_refresh">Refresh</button>
      </div>
    </div>
    
    <div id="inventory-grid" class="w-full max-w-3xl flex flex-col gap-1 pb-10">
      <!-- Generated by JS -->
    </div>
  </main>

  <aside class="w-[420px] shrink-0 flex flex-col build-panel border-l">
    <div id="inv-config-panel" class="shrink-0 border-b border-[#2a2a2a] bg-black/60 p-4">
      <!-- Edit/add config goes here -->
    </div>
    <div class="p-4 bg-black/60 border-b border-[#2a2a2a]">
      <div class="flex justify-between items-center mb-4">
        <h3 id="inv-mode-label" class="fantasy-font text-[#bfa571] uppercase tracking-widest text-sm" data-i18n="inv_add_item">Add Item</h3>
        <button class="text-[10px] uppercase text-gray-500 hover:text-white transition-colors border border-white/10 px-2 py-1" onclick="clearInvSelection()" data-i18n="inv_clear">Clear</button>
      </div>
      <input id="inv-item-search" class="build-input" placeholder="Search item to add..." data-i18n="inv_search" oninput="queueInvSearch()">
      <select id="inv-category-filter" class="build-input mt-2" onchange="runInvSearch()"></select>
    </div>
    <div class="flex-1 overflow-y-auto p-3 custom-scrollbar">
      <div id="inv-search-results" class="grid grid-cols-5 gap-1.5"></div>
    </div>
  </aside>
</div>
