name: Build Mod

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Mod
        run: uv run build.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PhantomToolKit-Release
          path: dist/
          retention-days: 3
